name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: olina-1212
          outputs: dist/github-snake.svg

      - name: Commit and push snake
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git checkout --orphan output
          git rm -rf .

          mkdir dist
          cp -r dist/github-snake.svg .

          git add github-snake.svg
          git commit -m "snake update"

          git push --force origin output
